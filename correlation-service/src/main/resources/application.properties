server.port=8084

spring.application.name=correlation-service

spring.neo4j.uri=bolt://localhost:7687
spring.neo4j.authentication.username=neo4j
spring.neo4j.authentication.password=${NEO4J_PASSWORD:password123}

spring.data.redis.host=localhost
spring.data.redis.port=6379

spring.data.redis.lettuce.pool.max-active=20
spring.data.redis.lettuce.pool.max-idle=10
spring.data.redis.lettuce.pool.min-idle=5
spring.data.redis.lettuce.pool.max-wait=500ms
spring.data.redis.lettuce.command-timeout=2s

correlation.min-severity=4.0
correlation.max-candidates=100
correlation.bundle-ttl-days=30

spring.kafka.bootstrap-servers=localhost:9092,localhost:9093,localhost:9094

spring.kafka.consumer.group-id=corr-grp
spring.kafka.consumer.auto-offset-reset=earliest

spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=*

spring.kafka.listener.auto-startup=true

resilience4j.circuitbreaker.instances.geoipBreaker.registerHealthIndicator=true
resilience4j.circuitbreaker.instances.geoipBreaker.slidingWindowSize=10
resilience4j.circuitbreaker.instances.geoipBreaker.minimumNumberOfCalls=5
resilience4j.circuitbreaker.instances.geoipBreaker.failureRateThreshold=50
resilience4j.circuitbreaker.instances.geoipBreaker.waitDurationInOpenState=30s
resilience4j.circuitbreaker.instances.geoipBreaker.permittedNumberOfCallsInHalfOpenState=3

resilience4j.retry.instances.geoipRetry.maxAttempts=3
resilience4j.retry.instances.geoipRetry.waitDuration=2s
resilience4j.retry.instances.geoipRetry.enableExponentialBackoff=true
resilience4j.retry.instances.geoipRetry.exponentialBackoffMultiplier=2

logging.level.com.vulnuris=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.kafka=WARN
logging.level.org.neo4j=INFO
logging.level.io.github.resilience4j=INFO

management.endpoints.web.exposure.include=health,info,metrics,kafkametrics
management.endpoint.health.show-details=when-authorized

correlation.geoip-url=http://ip-api.com/json/
correlation.cisa-kev-url=https://www.cisa.gov/sites/default/files/feeds/known_exploited_vulnerabilities.json